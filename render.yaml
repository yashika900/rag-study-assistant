services:
  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  - type: web
    name: rag-study-assistant-backend
    env: python
    plan: free
    rootDir: backend                        # ← Render runs from here

    buildCommand: pip install -r requirements.txt

    # Module path is now  app.main:app  (not backend.app.main:app)
    # because rootDir is already "backend/".
    # $PORT is set automatically by Render — never hardcode 10000.
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: GEMINI_API_KEY
        sync: false                         # set manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11"                       # explicit avoids build surprises